name: 🍕 Run Pizza System Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  run-all-tests:
    runs-on: ubuntu-latest

    steps:
      # Passo 1: Baixar o código do repositório
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # Passo 2: Instalar o Node.js na nuvem
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ---- PASSO A: CONFIGURAR O BACKEND ----
      - name: 📦 Install Backend Dependencies
        working-directory: ./backend-api
        run: npm install

      # ---- PASSO B: CONFIGURAR O FRONTEND (APP) ----
      - name: 📦 Install Frontend Dependencies
        working-directory: ./app
        run: npm install

      # ---- PASSO C: CONFIGURAR OS TESTES E2E ----
      - name: 📦 Install E2E Tests Dependencies
        working-directory: ./e2e-tests
        run: npm install

      - name: 🌐 Install Playwright Browsers & System Dependencies
        working-directory: ./e2e-tests
        run: |
          chmod -R +x ./node_modules/.bin
          npx playwright install chromium
          npx playwright install-deps chromium

      # Passo Único: Iniciar Servidores em Background, Esperar ficarem online e Rodar os Testes E2E
      - name: 🚀 Start Servers & Run E2E Tests
        run: |
          (cd backend-api && node server.js) &
          (cd app && npm run dev) &
          npx wait-on http://localhost:3000 --timeout 60000
          npx wait-on http://localhost:5173 --timeout 60000
          (cd e2e-tests && npx playwright test)
